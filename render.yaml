services:
  - type: web
    name: realstate-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://real-state-quz2.vercel.app
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_COOKIE_EXPIRE
        value: "7"
      # Set MONGODB_URI in Render dashboard (Secret) — must start with mongodb+srv://
      # Example: mongodb+srv://user:pass@cluster.mongodb.net/realp?retryWrites=true&w=majority
